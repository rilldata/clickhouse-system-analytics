type: connector

driver: clickhouse
host: '{{ .env.connector.clickhouse.host }}'
username: '{{ .env.connector.clickhouse.username }}'
password: '{{ .env.connector.clickhouse.password }}'
cluster: '{{ .env.connector.clickhouse.cluster }}'
database: default
mode: readwrite
port: 9440
ssl: true
