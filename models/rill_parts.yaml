connector: clickhouse

database: default
sql: >
  SELECT  CASE WHEN extract(partition, '(d{4})/(d{2})/(d{2})(?:/?(d{1,2}))?') != '' THEN toDateTime(concat(arrayStringConcat(arraySlice(extractAllGroups(partition, '(d{4})/(d{2})/(d{2})(?:/?(d{1,2}))?')[1], 1, 3), '-'), ' 00:00:00')) + toIntervalHour(toInt32OrZero((extractAllGroups(partition, '(d{4})/(d{2})/(d{2})(?:/?(d{1,2}))?')[1])[4]))
              WHEN startsWith(partition,'202') THEN parseDateTimeBestEffort(partition)
              ELSE toDateTime('1970-01-01')
          END AS __time
        ,partition
        ,name
        ,part_type
        ,active
        ,marks
        ,rows
        ,bytes_on_disk
        ,data_compressed_bytes
        ,data_uncompressed_bytes
        ,primary_key_size
        ,marks_bytes
        ,secondary_indices_compressed_bytes
        ,secondary_indices_uncompressed_bytes
        ,secondary_indices_marks_bytes
        ,modification_time
        ,remove_time
        ,refcount
        ,min_date
        ,max_date
        ,min_time
        ,max_time
        ,partition_id
        ,min_block_number
        ,max_block_number
        ,level
        ,data_version
        ,primary_key_bytes_in_memory
        ,primary_key_bytes_in_memory_allocated
        ,is_frozen
        ,database
        ,table
        ,engine
        ,disk_name
        ,path
        ,hash_of_all_files
        ,hash_of_uncompressed_files
        ,uncompressed_hash_of_compressed_files
        ,delete_ttl_info_min
        ,delete_ttl_info_max
        ,move_ttl_info.expression
        ,move_ttl_info.min
        ,move_ttl_info.max
        ,default_compression_codec
        ,recompression_ttl_info.expression
        ,recompression_ttl_info.min
        ,recompression_ttl_info.max
        ,group_by_ttl_info.expression
        ,group_by_ttl_info.min
        ,group_by_ttl_info.max
        ,rows_where_ttl_info.expression
        ,rows_where_ttl_info.min
        ,rows_where_ttl_info.max
        ,projections
        ,visible
        ,removal_tid_lock
        ,creation_csn
        ,removal_csn
        ,has_lightweight_delete
        ,last_removal_attempt_time
        ,removal_state
        ,bytes
        ,marks_size
        ,part_name
  FROM clusterAllReplicas('{{ .env.connector.clickhouse.cluster }}', 'system', 'parts')
  WHERE __time >= toDateTime('2001-01-01')

