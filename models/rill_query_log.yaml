connector: clickhouse

database: default
sql: >
    SELECT
      hostname,
      type,
      event_date,
      event_time,
      event_time_microseconds,
      query_start_time,
      query_start_time_microseconds,
      query_duration_ms,
      read_rows,
      read_bytes,
      written_rows,
      written_bytes,
      result_rows,
      result_bytes,
      memory_usage,
      current_database,
      query,
      formatted_query,
      normalized_query_hash,
      query_kind,
      databases,
      tables,
      columns,
      partitions,
      projections,
      views,
      exception_code,
      exception,
      stack_trace,
      is_initial_query,
      user,
      query_id,
      address,
      port,
      initial_user,
      initial_query_id,
      initial_address,
      initial_port,
      initial_query_start_time,
      initial_query_start_time_microseconds,
      interface,
      is_secure,
      os_user,
      client_hostname,
      client_name,
      client_revision,
      client_version_major,
      client_version_minor,
      client_version_patch,
      http_method,
      http_user_agent,
      http_referer,
      forwarded_for,
      quota_key,
      distributed_depth,
      revision,
      log_comment,
      thread_ids,
      peak_threads_usage,
      toString(parseDateTimeBestEffortOrNull(extractAll(query,'(?:(?:toDateTime|_CAST)\\(\'([^\']+)\'(?:,\\s*\'DateTime\')?\\))')[1])) AS start_date,
      toString(parseDateTimeBestEffortOrNull(extractAll(query,'(?:(?:toDateTime|_CAST)\\(\'([^\']+)\'(?:,\\s*\'DateTime\')?\\))')[2])) AS end_date,
      dateDiff('hour', parseDateTimeBestEffortOrNull(extractAll(query,'(?:(?:toDateTime|_CAST)\\(\'([^\']+)\'(?:,\\s*\'DateTime\')?\\))')[1]), parseDateTimeBestEffortOrNull(extractAll(query,'(?:(?:toDateTime|_CAST)\\(\'([^\']+)\'(?:,\\s*\'DateTime\')?\\))')[2])) AS interval_hours,
      dateDiff('day', parseDateTimeBestEffortOrNull(extractAll(query,'(?:(?:toDateTime|_CAST)\\(\'([^\']+)\'(?:,\\s*\'DateTime\')?\\))')[1]), parseDateTimeBestEffortOrNull(extractAll(query,'(?:(?:toDateTime|_CAST)\\(\'([^\']+)\'(?:,\\s*\'DateTime\')?\\))')[2])) AS interval_days_truncated,
      extract(query, 'FROM\\s+["`]?(\\w+(?:\\.\\w+)?)["`]?' ) AS table_name,
      ProfileEvents['Query'] AS Query,
      ProfileEvents['SelectQuery'] AS SelectQuery,
      ProfileEvents['InitialQuery'] AS InitialQuery,
      ProfileEvents['QueriesWithSubqueries'] AS QueriesWithSubqueries,
      ProfileEvents['SelectQueriesWithSubqueries'] AS SelectQueriesWithSubqueries,
      ProfileEvents['SelectQueriesWithPrimaryKeyUsage'] AS SelectQueriesWithPrimaryKeyUsage,
      ProfileEvents['FileOpen'] AS FileOpen,
      ProfileEvents['ReadBufferFromFileDescriptorReadBytes'] AS ReadBufferFromFileDescriptorReadBytes,
      ProfileEvents['ReadCompressedBytes'] AS ReadCompressedBytes,
      ProfileEvents['CompressedReadBufferBlocks'] AS CompressedReadBufferBlocks,
      ProfileEvents['CompressedReadBufferBytes'] AS CompressedReadBufferBytes,
      ProfileEvents['OpenedFileCacheHits'] AS OpenedFileCacheHits,
      ProfileEvents['OpenedFileCacheMisses'] AS OpenedFileCacheMisses,
      ProfileEvents['OpenedFileCacheMicroseconds'] AS OpenedFileCacheMicroseconds,
      ProfileEvents['IOBufferAllocs'] AS IOBufferAllocs,
      ProfileEvents['IOBufferAllocBytes'] AS IOBufferAllocBytes,
      ProfileEvents['FunctionExecute'] AS FunctionExecute,
      ProfileEvents['MarkCacheHits'] AS MarkCacheHits,
      ProfileEvents['MarkCacheMisses'] AS MarkCacheMisses,
      ProfileEvents['QueryCacheMisses'] AS QueryCacheMisses,
      ProfileEvents['CreatedReadBufferOrdinary'] AS CreatedReadBufferOrdinary,
      ProfileEvents['DiskReadElapsedMicroseconds'] AS DiskReadElapsedMicroseconds,
      ProfileEvents['NetworkSendElapsedMicroseconds'] AS NetworkSendElapsedMicroseconds,
      ProfileEvents['NetworkSendBytes'] AS NetworkSendBytes,
      ProfileEvents['SelectedParts'] AS SelectedParts,
      ProfileEvents['SelectedPartsTotal'] AS SelectedPartsTotal,
      ProfileEvents['SelectedRanges'] AS SelectedRanges,
      ProfileEvents['SelectedMarks'] AS SelectedMarks,
      ProfileEvents['SelectedMarksTotal'] AS SelectedMarksTotal,
      ProfileEvents['SelectedRows'] AS SelectedRows,
      ProfileEvents['SelectedBytes'] AS SelectedBytes,
      ProfileEvents['RealTimeMicroseconds'] AS RealTimeMicroseconds,
      ProfileEvents['UserTimeMicroseconds'] AS UserTimeMicroseconds,
      ProfileEvents['SystemTimeMicroseconds'] AS SystemTimeMicroseconds,
      ProfileEvents['SoftPageFaults'] AS SoftPageFaults,
      ProfileEvents['OSCPUVirtualTimeMicroseconds'] AS OSCPUVirtualTimeMicroseconds,
      ProfileEvents['OSReadChars'] AS OSReadChars,
      ProfileEvents['OSWriteChars'] AS OSWriteChars,
      used_aggregate_functions,
      used_aggregate_function_combinators,
      used_database_engines,
      used_data_type_families,
      used_dictionaries,
      used_formats,
      used_functions,
      used_storages,
      used_table_functions,
      used_row_policies,
      used_privileges,
      missing_privileges,
      query_cache_usage,
      asynchronous_read_counters
    FROM clusterAllReplicas('{{ .env.connector.clickhouse.cluster }}', merge('system', '^query_log'));

output:
